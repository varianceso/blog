<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逍遥云初</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Noto Serif SC', serif; 
            background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), 
                        url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1920&q=80') center/cover fixed;
            min-height: 100vh;
            color: #333;
        }
        header { 
            text-align: center; 
            padding: 50px 20px 30px; 
        }
        h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 3em;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        .subtitle { 
            color: rgba(255,255,255,0.9); 
            font-size: 1em; 
            margin-top: 10px; 
            letter-spacing: 3px; 
        }
        
        /* 分类筛选 */
        .filters {
            text-align: center;
            margin: 20px 0 30px;
            padding: 0 20px;
        }
        .filter-btn {
            display: inline-block;
            margin: 5px 8px;
            padding: 8px 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 25px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        
        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 0 20px 80px; 
        }
        .article-card {
            background: rgba(255,255,255,0.95);
            border-radius: 4px;
            padding: 25px;
            margin-bottom: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .article-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.12); 
        }
        .article-title { 
            font-size: 1.2em; 
            font-weight: 500; 
            color: #2c2c2c; 
            margin-bottom: 8px; 
        }
        .article-title a { 
            color: inherit; 
            text-decoration: none; 
        }
        .article-meta { 
            color: #888; 
            font-size: 0.8em; 
            margin-bottom: 10px; 
        }
        .article-excerpt { 
            color: #555; 
            font-size: 0.9em; 
            line-height: 1.7;
        }
        
        /* 底部悬浮登录按钮 */
        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px 25px;
            background: linear-gradient(to top, rgba(255,255,255,0.98) 60%, transparent);
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .login-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 30px;
            font-size: 0.9em;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }
        
        footer { 
            text-align: center; 
            padding: 30px 20px 120px; 
            color: rgba(255,255,255,0.7); 
            font-size: 0.8em; 
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.2em; }
            .container { padding: 0 15px 100px; }
            .article-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>逍遥云初</h1>
        <p class="subtitle">记录 · 思考 · 成长</p>
        
        <div class="filters">
            <a href="/" class="filter-btn active">全部</a>
            <a href="/?category=系统与历史" class="filter-btn">系统与历史</a>
            <a href="/?category=记录与思考" class="filter-btn">记录与思考</a>
            <a href="/?category=小说" class="filter-btn">小说</a>
        </div>
    </header>
    
    <div class="container">
        <div class="article-card" data-category="系统与历史">
            <h2 class="article-title"><a href="/articles/system.html">在系统之内：一个工程师的历史、技术与自处</a></h2>
            <p class="article-meta">2026-03-14 · 系统与历史</p>
            <p class="article-excerpt">在技术、历史与系统夹缝中，寻找一个不被吞没的位置...</p>
        </div>
        
        <div class="article-card" data-category="记录与思考">
            <h2 class="article-title"><a href="/articles/moved.html">我被打动的那一刻，往往不是因为故事</a></h2>
            <p class="article-meta">2026-03-14 · 记录与思考</p>
            <p class="article-excerpt">一直都有这种情况。刷到一段文字，或者看到一个短视频...</p>
        </div>
        
        <div class="article-card" data-category="小说">
            <h2 class="article-title"><a href="/articles/passive.html">被动</a></h2>
            <p class="article-meta">2026-03-14 · 小说</p>
            <p class="article-excerpt">一部关于性格、算计与沉默如何被现实反复利用的中篇小说...</p>
        </div>
    </div>
    
    <div class="fixed-bottom">
        <a href="https://platform.minimaxi.com/" target="_blank" class="login-btn">Minimax 登录</a>
    </div>
    
    <footer>© 2026 逍遥云初</footer>
    
    <script>
        // 简单的前端分类筛选
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category');
        
        if (category) {
            document.querySelectorAll('.article-card').forEach(card => {
                if (card.dataset.category !== category) {
                    card.style.display = 'none';
                }
            });
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === category) {
                    btn.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
