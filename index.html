<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逍遥云初</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1920&q=80') center/cover fixed;
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; padding: 60px 0; }
        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 4em;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 10px;
        }
        .subtitle { color: rgba(255,255,255,0.9); font-size: 1.2em; margin-top: 15px; letter-spacing: 5px; }
        .article-list { margin-top: 40px; }
        .article-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .article-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .article-card img { width: 100%; height: 250px; object-fit: cover; }
        .article-content { padding: 25px; }
        .article-title { font-size: 1.5em; color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
        .article-meta { color: #667eea; font-size: 0.9em; margin-bottom: 15px; }
        .article-tags span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>逍遥云初</h1>
            <p class="subtitle">记录 · 思考 · 成长</p>
        </header>
        <div class="article-list">
            <div class="article-card">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80" alt="封面">
                <div class="article-content">
                    <h2 class="article-title">在系统之内：一个工程师的历史、技术与自处</h2>
                    <p class="article-meta">2026-03-14 · 系统与历史</p>
                    <div class="article-tags"><span>成长</span><span>感悟</span></div>
                </div>
            </div>
            <div class="article-card">
                <img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800&q=80" alt="封面">
                <div class="article-content">
                    <h2 class="article-title">我被打动的那一刻，往往不是因为故事</h2>
                    <p class="article-meta">2026-03-14 · 记录与思考</p>
                    <div class="article-tags"><span>成长</span><span>感悟</span><span>随笔</span></div>
                </div>
            </div>
            <div class="article-card">
                <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800&q=80" alt="封面">
                <div class="article-content">
                    <h2 class="article-title">被动</h2>
                    <p class="article-meta">2026-03-14 · 小说</p>
                    <div class="article-tags"><span>小说</span></div>
                </div>
            </div>
        </div>
        <footer><p>© 2026 逍遥云初 · 记录、思考与成长</p></footer>
    </div>
</body>
</html>
